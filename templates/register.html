<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — SIGAP Lampung</title>
<meta name="description" content="Daftar akun SIGAP Lampung">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --accent:#6366f1;--accent2:#818cf8;
  --danger:#ef4444;--success:#10b981;
  --glass-bg:rgba(255,255,255,0.06);
  --glass-border:rgba(255,255,255,0.1);
}
body{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  font-family:'Inter',sans-serif;
  background:#080b16;
  overflow:hidden;position:relative;
}
.bg-gradient{
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 40%,rgba(16,185,129,0.12),transparent),
    radial-gradient(ellipse 60% 40% at 80% 60%,rgba(99,102,241,0.1),transparent),
    radial-gradient(ellipse 50% 50% at 50% 100%,rgba(139,92,246,0.08),transparent);
  animation:bgShift 8s ease-in-out infinite alternate;
}
@keyframes bgShift{
  0%{opacity:1;transform:scale(1)}
  100%{opacity:0.7;transform:scale(1.05)}
}
.bg-grid{
  position:fixed;inset:0;z-index:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);
  background-size:60px 60px;
}
.register-card{
  position:relative;z-index:10;
  width:100%;max-width:460px;
  background:rgba(15,23,42,0.7);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:24px;
  padding:44px 40px;
  box-shadow:0 24px 80px rgba(0,0,0,0.5),0 0 0 1px rgba(255,255,255,0.05) inset;
  animation:cardIn 0.6s cubic-bezier(0.16,1,0.3,1);
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(30px) scale(0.96)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
.register-logo{
  width:56px;height:56px;margin:0 auto 14px;
  background:linear-gradient(135deg,var(--success),#06b6d4);
  border-radius:16px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 32px rgba(16,185,129,0.4);
}
.register-logo svg{width:26px;height:26px;color:#fff}
.register-title{
  text-align:center;font-size:24px;font-weight:800;
  color:#f1f5f9;letter-spacing:-0.5px;margin-bottom:4px;
}
.register-subtitle{
  text-align:center;font-family:'JetBrains Mono',monospace;
  font-size:11px;color:#64748b;margin-bottom:28px;
  letter-spacing:0.5px;
}
.form-group{margin-bottom:18px;position:relative}
.form-label{
  display:block;font-size:12px;font-weight:600;color:#94a3b8;
  margin-bottom:7px;letter-spacing:0.3px;
}
.form-input{
  width:100%;padding:13px 16px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:12px;color:#f1f5f9;
  font-family:'Inter',sans-serif;font-size:14px;
  transition:all 0.3s;outline:none;
}
.form-input::placeholder{color:#475569}
.form-input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(99,102,241,0.2);
  background:rgba(255,255,255,0.08);
}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-select{
  width:100%;padding:13px 16px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:12px;color:#f1f5f9;
  font-family:'Inter',sans-serif;font-size:14px;
  transition:all 0.3s;outline:none;
  appearance:none;cursor:pointer;
}
.form-select option{background:#1e293b;color:#f1f5f9}
.form-select:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(99,102,241,0.2);
}
.error-msg{
  background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);
  border-radius:10px;padding:12px 16px;margin-bottom:18px;
  color:#fca5a5;font-size:13px;font-weight:500;
  display:flex;align-items:center;gap:8px;
  animation:shake 0.5s ease;
}
.success-msg{
  background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.25);
  border-radius:10px;padding:12px 16px;margin-bottom:18px;
  color:#6ee7b7;font-size:13px;font-weight:500;
  display:flex;align-items:center;gap:8px;
}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  10%,30%,50%,70%,90%{transform:translateX(-4px)}
  20%,40%,60%,80%{transform:translateX(4px)}
}
.error-dot{width:6px;height:6px;border-radius:50%;background:var(--danger);flex-shrink:0}
.success-dot{width:6px;height:6px;border-radius:50%;background:var(--success);flex-shrink:0}
.register-btn{
  width:100%;padding:14px;border:none;border-radius:12px;
  background:linear-gradient(135deg,var(--success),#06b6d4);
  color:#fff;font-family:'Inter',sans-serif;
  font-size:14px;font-weight:700;cursor:pointer;
  transition:all 0.3s;position:relative;overflow:hidden;
  box-shadow:0 4px 20px rgba(16,185,129,0.35);
  margin-top:4px;
}
.register-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 32px rgba(16,185,129,0.45);
}
.register-btn:active{transform:translateY(0)}
.register-btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,transparent,rgba(255,255,255,0.1),transparent);
  transform:translateX(-100%);transition:transform 0.5s;
}
.register-btn:hover::after{transform:translateX(100%)}
.register-footer{
  text-align:center;margin-top:22px;
  font-size:13px;color:#64748b;
}
.register-footer a{
  color:var(--accent);font-weight:600;
  text-decoration:none;transition:color 0.2s;
}
.register-footer a:hover{color:var(--accent2)}
.particle{
  position:fixed;border-radius:50%;
  background:rgba(16,185,129,0.25);
  animation:float linear infinite;
  z-index:1;pointer-events:none;
}
@keyframes float{
  0%{transform:translateY(100vh) rotate(0deg);opacity:0}
  10%{opacity:1}
  90%{opacity:1}
  100%{transform:translateY(-10vh) rotate(720deg);opacity:0}
}
@media(max-width:480px){
  .register-card{margin:16px;padding:32px 24px;border-radius:20px}
  .register-title{font-size:20px}
  .form-row{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="bg-gradient"></div>
<div class="bg-grid"></div>

<div class="particle" style="width:4px;height:4px;left:15%;animation-duration:13s;animation-delay:0s"></div>
<div class="particle" style="width:3px;height:3px;left:35%;animation-duration:11s;animation-delay:2s"></div>
<div class="particle" style="width:5px;height:5px;left:55%;animation-duration:14s;animation-delay:1s"></div>
<div class="particle" style="width:3px;height:3px;left:75%;animation-duration:12s;animation-delay:3s"></div>
<div class="particle" style="width:4px;height:4px;left:90%;animation-duration:15s;animation-delay:4s"></div>

<div class="register-card">
  <div class="register-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
      <circle cx="8.5" cy="7" r="4"/>
      <line x1="20" y1="8" x2="20" y2="14"/>
      <line x1="23" y1="11" x2="17" y2="11"/>
    </svg>
  </div>

  <h1 class="register-title">Buat Akun Baru</h1>
  <p class="register-subtitle">SIGAP LAMPUNG · DAFTAR AKUN</p>

  {% if error %}
  <div class="error-msg"><div class="error-dot"></div>{{ error }}</div>
  {% endif %}
  {% if success %}
  <div class="success-msg"><div class="success-dot"></div>{{ success }}</div>
  {% endif %}

  <form method="POST" action="{{ url_for('register') }}">
    <div class="form-group">
      <label class="form-label" for="name">Nama Lengkap</label>
      <input class="form-input" type="text" id="name" name="name"
             placeholder="Masukkan nama lengkap" required
             value="{{ request.form.get('name', '') }}">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input class="form-input" type="text" id="username" name="username"
               placeholder="Username" autocomplete="username" required
               value="{{ request.form.get('username', '') }}">
      </div>
      <div class="form-group">
        <label class="form-label" for="role">Role</label>
        <select class="form-select" id="role" name="role">
          <option value="Operator">Operator</option>
          <option value="Administrator">Administrator</option>
          <option value="Super Admin">Super Admin</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input class="form-input" type="password" id="password" name="password"
             placeholder="Minimal 6 karakter" autocomplete="new-password" required>
    </div>

    <div class="form-group">
      <label class="form-label" for="confirm_password">Konfirmasi Password</label>
      <input class="form-input" type="password" id="confirm_password" name="confirm_password"
             placeholder="Ulangi password" autocomplete="new-password" required>
    </div>

    <button class="register-btn" type="submit">Daftar Sekarang</button>
  </form>

  <div class="register-footer">
    Sudah punya akun? <a href="{{ url_for('login') }}">Masuk di sini</a>
  </div>
</div>

</body>
</html>
