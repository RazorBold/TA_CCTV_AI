<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — SIGAP Lampung</title>
<meta name="description" content="Login ke SIGAP Lampung - Sistem Informasi Pengelolaan Sampah Provinsi Lampung">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --accent:#6366f1;--accent2:#818cf8;
  --danger:#ef4444;--success:#10b981;
  --glass-bg:rgba(255,255,255,0.06);
  --glass-border:rgba(255,255,255,0.1);
}
body{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  font-family:'Inter',sans-serif;
  background:#080b16;
  overflow:hidden;position:relative;
}
/* Animated gradient background */
.bg-gradient{
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 40%,rgba(99,102,241,0.15),transparent),
    radial-gradient(ellipse 60% 40% at 80% 60%,rgba(139,92,246,0.1),transparent),
    radial-gradient(ellipse 50% 50% at 50% 100%,rgba(6,182,212,0.08),transparent);
  animation:bgShift 8s ease-in-out infinite alternate;
}
@keyframes bgShift{
  0%{opacity:1;transform:scale(1)}
  100%{opacity:0.7;transform:scale(1.05)}
}
/* Grid background */
.bg-grid{
  position:fixed;inset:0;z-index:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);
  background-size:60px 60px;
}
/* Login card */
.login-card{
  position:relative;z-index:10;
  width:100%;max-width:420px;
  background:rgba(15,23,42,0.7);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:24px;
  padding:48px 40px;
  box-shadow:0 24px 80px rgba(0,0,0,0.5),0 0 0 1px rgba(255,255,255,0.05) inset;
  animation:cardIn 0.6s cubic-bezier(0.16,1,0.3,1);
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(30px) scale(0.96)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
/* Logo */
.login-logo{
  width:64px;height:64px;margin:0 auto 16px;
  background:linear-gradient(135deg,var(--accent),#8b5cf6);
  border-radius:18px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 32px rgba(99,102,241,0.4);
  animation:logoPulse 3s ease-in-out infinite;
}
@keyframes logoPulse{
  0%,100%{box-shadow:0 8px 32px rgba(99,102,241,0.3)}
  50%{box-shadow:0 8px 48px rgba(99,102,241,0.6)}
}
.login-logo svg{width:30px;height:30px;color:#fff}
.login-title{
  text-align:center;font-size:26px;font-weight:800;
  color:#f1f5f9;letter-spacing:-0.5px;margin-bottom:4px;
}
.login-subtitle{
  text-align:center;font-family:'JetBrains Mono',monospace;
  font-size:11px;color:#64748b;margin-bottom:32px;
  letter-spacing:0.5px;
}
/* Form */
.form-group{margin-bottom:20px;position:relative}
.form-label{
  display:block;font-size:12px;font-weight:600;color:#94a3b8;
  margin-bottom:8px;letter-spacing:0.3px;
}
.form-input{
  width:100%;padding:14px 16px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:12px;color:#f1f5f9;
  font-family:'Inter',sans-serif;font-size:14px;
  transition:all 0.3s;outline:none;
}
.form-input::placeholder{color:#475569}
.form-input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(99,102,241,0.2);
  background:rgba(255,255,255,0.08);
}
/* Error */
.error-msg{
  background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);
  border-radius:10px;padding:12px 16px;margin-bottom:20px;
  color:#fca5a5;font-size:13px;font-weight:500;
  display:flex;align-items:center;gap:8px;
  animation:shake 0.5s ease;
}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  10%,30%,50%,70%,90%{transform:translateX(-4px)}
  20%,40%,60%,80%{transform:translateX(4px)}
}
.error-dot{width:6px;height:6px;border-radius:50%;background:var(--danger);flex-shrink:0}
/* Button */
.login-btn{
  width:100%;padding:14px;border:none;border-radius:12px;
  background:linear-gradient(135deg,var(--accent),#8b5cf6);
  color:#fff;font-family:'Inter',sans-serif;
  font-size:14px;font-weight:700;cursor:pointer;
  transition:all 0.3s;position:relative;overflow:hidden;
  box-shadow:0 4px 20px rgba(99,102,241,0.4);
}
.login-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 32px rgba(99,102,241,0.5);
}
.login-btn:active{transform:translateY(0)}
.login-btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,transparent,rgba(255,255,255,0.1),transparent);
  transform:translateX(-100%);transition:transform 0.5s;
}
.login-btn:hover::after{transform:translateX(100%)}
/* Footer */
.login-footer{
  text-align:center;margin-top:24px;
  font-family:'JetBrains Mono',monospace;
  font-size:10px;color:#334155;line-height:1.8;
}
.login-footer strong{color:#64748b}
/* Floating particles */
.particle{
  position:fixed;border-radius:50%;
  background:rgba(99,102,241,0.3);
  animation:float linear infinite;
  z-index:1;pointer-events:none;
}
@keyframes float{
  0%{transform:translateY(100vh) rotate(0deg);opacity:0}
  10%{opacity:1}
  90%{opacity:1}
  100%{transform:translateY(-10vh) rotate(720deg);opacity:0}
}
/* Responsive */
@media(max-width:480px){
  .login-card{margin:16px;padding:36px 28px;border-radius:20px}
  .login-title{font-size:22px}
}
</style>
</head>
<body>

<div class="bg-gradient"></div>
<div class="bg-grid"></div>

<!-- Floating particles -->
<div class="particle" style="width:4px;height:4px;left:10%;animation-duration:12s;animation-delay:0s"></div>
<div class="particle" style="width:3px;height:3px;left:25%;animation-duration:15s;animation-delay:2s"></div>
<div class="particle" style="width:5px;height:5px;left:45%;animation-duration:10s;animation-delay:4s"></div>
<div class="particle" style="width:3px;height:3px;left:65%;animation-duration:14s;animation-delay:1s"></div>
<div class="particle" style="width:4px;height:4px;left:80%;animation-duration:11s;animation-delay:3s"></div>
<div class="particle" style="width:2px;height:2px;left:90%;animation-duration:16s;animation-delay:5s"></div>

<div class="login-card">
  <div class="login-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M12 2L2 7l10 5 10-5-10-5z"/>
      <path d="M2 17l10 5 10-5"/>
      <path d="M2 12l10 5 10-5"/>
    </svg>
  </div>

  <h1 class="login-title">SIGAP Lampung</h1>
  <p class="login-subtitle">SISTEM INFORMASI PENGELOLAAN SAMPAH</p>

  {% if error %}
  <div class="error-msg">
    <div class="error-dot"></div>
    {{ error }}
  </div>
  {% endif %}

  <form method="POST" action="{{ url_for('login') }}">
    <div class="form-group">
      <label class="form-label" for="username">Username</label>
      <input class="form-input" type="text" id="username" name="username"
             placeholder="Masukkan username" autocomplete="username" autofocus required>
    </div>
    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input class="form-input" type="password" id="password" name="password"
             placeholder="Masukkan password" autocomplete="current-password" required>
    </div>
    <button class="login-btn" type="submit">Masuk ke Dashboard</button>
  </form>

  <div class="login-footer" style="font-size:13px;color:#64748b;margin-top:24px">
    Belum punya akun? <a href="{{ url_for('register') }}" style="color:#818cf8;font-weight:600;text-decoration:none">Daftar di sini</a>
  </div>

  <div class="login-footer">
    <strong>Demo Login:</strong><br>
    admin / admin123<br>
    Powered by <strong>Roboflow AI</strong> · CCTV Monitoring
  </div>
</div>

</body>
</html>
